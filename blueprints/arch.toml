# Arch (PeacockOS) blueprint — see SCHEMA.md.
# Flavor + target disk are chosen in PRP *before* this blueprint is fetched (the flavor choice
# selects which blueprint to download), so they are not stages here. install-phase stages run
# during the PRP install; oobe-phase stages run on first boot, in the base, against /flavors/arch.

schema = 1
flavor = "arch"
title  = "Arch (PeacockOS)"

# ---- install phase (runs in PRP, target being laid down) --------------------------------------

[[stage]]
id    = "hostname"
phase = "install"
title = "Name this device"

  [[stage.field]]
  key      = "host"
  type     = "text"
  label    = "HOSTNAME"
  default  = "peacock"
  validate = "^[a-z0-9][a-z0-9-]{0,62}$"
  required = true

  # init system is per-flavor (Arch supports both) and drives which init-<init> package PRP
  # installs — declared here so it's scriptable, not hardcoded in the installer.
  [[stage.field]]
  key     = "init"
  type    = "dropdown"
  label   = "INIT SYSTEM"
  options = ["openrc","systemd"]
  default = "openrc"

action = """
bp_log "hostname -> $ANS_host"
printf '%s\\n' "$ANS_host" > "$ROOT/etc/hostname"
"""

# ---- oobe phase (runs first boot, in the base, ROOT=/flavors/arch) -----------------------------

[[stage]]
id    = "account"
phase = "oobe"
title = "Create your account"

  [[stage.field]]
  key      = "user"
  type     = "text"
  label    = "USERNAME"
  placeholder = "e.g. emre"
  validate = "^[a-z_][a-z0-9_-]*$"
  required = true

  [[stage.field]]
  key      = "pass"
  type     = "password"
  label    = "PASSWORD"
  required = true

action = """
bp_log "creating $ANS_user"
run_in_target useradd -m -G wheel "$ANS_user" || bp_fail "useradd failed"
printf '%s:%s' "$ANS_user" "$ANS_pass" | run_in_target chpasswd || bp_fail "chpasswd failed"
"""

[[stage]]
id       = "timezone"
phase    = "oobe"
title    = "Set your timezone"
requires = ["account"]

  [[stage.field]]
  key         = "timezone"
  type        = "text"
  label       = "TIMEZONE"
  placeholder = "Region/City — e.g. Europe/Istanbul"
  default     = "UTC"
  validate    = "^[A-Za-z]+/[A-Za-z_+-]+$|^UTC$"
  required    = true

action = """
bp_log "timezone -> $ANS_timezone"
run_in_target ln -sf "/usr/share/zoneinfo/$ANS_timezone" /etc/localtime || bp_fail "bad timezone"
"""

[[stage]]
id       = "locale"
phase    = "oobe"
title    = "Set your language"
requires = ["account"]

  [[stage.field]]
  key     = "locale"
  type    = "dropdown"
  label   = "LOCALE"
  options = ["en_US.UTF-8","en_GB.UTF-8","de_DE.UTF-8","fr_FR.UTF-8","es_ES.UTF-8","tr_TR.UTF-8","ru_RU.UTF-8","zh_CN.UTF-8","ja_JP.UTF-8"]
  default = "en_US.UTF-8"

action = """
bp_log "locale -> $ANS_locale"
run_in_target sh -c "echo '$ANS_locale UTF-8' >> /etc/locale.gen && locale-gen"
printf 'LANG=%s\\n' "$ANS_locale" | run_in_target tee /etc/locale.conf >/dev/null
"""

[[stage]]
id       = "desktop"
phase    = "oobe"
title    = "Choose a desktop"
requires = ["account"]

  [[stage.field]]
  key     = "desktop"
  type    = "dropdown"
  label   = "DESKTOP"
  options = ["none","XFCE","KDE Plasma","GNOME"]
  default = "none"

  [[stage.field]]
  key     = "dm"
  type    = "dropdown"
  label   = "LOGIN MANAGER"
  options = ["none","SDDM","LightDM"]
  default = "none"
  when    = "desktop != none"

# Bigger action → a separately fetched + verified script. ANS_desktop / ANS_dm are exported.
action_script = "stages/arch/desktop.sh"
