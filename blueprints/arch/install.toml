# Arch INSTALL blueprint (blueprints/<channel>/arch/install.toml) — the recipe for bringing up the
# Arch FLAVOR base: where to fetch its base rootfs tarball, how to lay it down under /flavors/arch,
# and the minimal post-extract prep to make it boot as a guest under peacock-init. Served from
# genmirror so the base-bringup updates without a PRP rebuild.
#
# PRP owns only the MECHANISM (partition the target's nested GPT, mkfs, mount at $ANS_target,
# install the Peacock base layer, stage the bootloader) and hands these vars to the runner:
#   $ANS_target  the mounted target root        $ANS_flavor  = arch
#   $ANS_init    chosen base init (openrc|...)   $ANS_device  device codename (e.g. daisy)
#   $ANS_arch    cpu arch (e.g. aarch64)
# User-facing setup (account, hostname, desktop, DM, timezone) is NOT here — that's the first-boot
# OOBE (configure.toml). This blueprint's only job: get the Arch base on disk and bootable.

schema = 1
kind   = "install"
flavor = "arch"
title  = "Arch base install"

[[stage]]
id    = "fetch-base"
phase = "install"
title = "Downloading the Arch base"
action = """
bp_progress 35
url="https://genmirror.peacockos.org/flavors/stable/$ANS_arch/arch-base.tar.gz"
bp_log "fetching the Arch base rootfs"
curl -fsSL "$url" -o /tmp/flavor-base.tar.gz || wget -q -O /tmp/flavor-base.tar.gz "$url" \
	|| bp_fail "could not download the Arch base ($url)"
"""

[[stage]]
id       = "extract-base"
phase    = "install"
title    = "Extracting the Arch base"
requires = ["fetch-base"]
action = """
bp_progress 70
dest="$ANS_target/flavors/$ANS_flavor"
mkdir -p "$dest" "$ANS_target/peacock/etc"
# -p preserves perms/owners from the base tarball.
tar -xpf /tmp/flavor-base.tar.gz -C "$dest" || bp_fail "extract failed"
# Record the active flavor so peacock-init boots it (and the OOBE knows which configure.toml).
printf '%s\\n' "$ANS_flavor" > "$ANS_target/peacock/etc/active-flavor"
rm -f /tmp/flavor-base.tar.gz
"""

[[stage]]
id       = "prep-base"
phase    = "install"
title    = "Preparing the Arch base"
requires = ["extract-base"]
action = """
bp_progress 90
root="$ANS_target/flavors/$ANS_flavor"
# Minimal post-extract prep so the flavor boots as a guest; the OOBE (configure.toml) does the
# real setup. Seed DNS so first-boot package installs can reach the network.
[ -f "$root/etc/resolv.conf" ] || cp /etc/resolv.conf "$root/etc/resolv.conf" 2>/dev/null || true
bp_log "Arch base laid down at /flavors/$ANS_flavor"
"""
