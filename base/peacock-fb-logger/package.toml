[package]
name = "peacock-fb-logger"
version = "1.1.1"
#
# 2026-02-14: fb0 can register late (especially on warm reset) on some devices.
# If the refresher exits early, the panel may stay black even if userspace is running.
# Keep this script conservative and generic.
description = "Keep MSM framebuffer refreshing during OpenRC boot"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
use_qemu = true
cross_compile = ""
type = "raw"
# No source/compilation — ./build.sh package() stages the fb refresher script
# and OpenRC service into $pkgdir.
