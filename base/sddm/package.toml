[package]
name = "sddm"
version = "0.21.0.2"
description = "QML based X11 and Wayland display manager (Artix PKGBUILD derived)"
depends = [
    "qt5-base",
    "qt5-declarative",
    "qt6-base",
    "qt6-declarative"
]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/sddm/sddm/archive/v0.21.0/sddm-0.21.0.tar.gz"
checksum = "f895de2683627e969e4849dbfbbb2b500787481ca5ba0de6d6dfdae5f1549abf"
build_deps = [
    "cmake",
    "extra-cmake-modules",
    "python-docutils",
    "qt5-base",
    "qt5-declarative",
    "qt5-tools",
    "qt6-declarative",
    "qt6-tools",
    "ninja"
]
type = "raw"
