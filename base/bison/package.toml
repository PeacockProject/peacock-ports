[package]
name = "bison"
version = "3.8.2"
description = "GNU parser generator (Arch version)"

[build]
source = "https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.xz"
checksum = ""
script = """
tarball="$(ls -1 bison-*.tar.xz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xJf "$tarball" --strip-components=1
fi
./configure --prefix="$(pwd)/stage"
make -j$(nproc)
make install
cp -a stage/bin ./
cp -a stage/share ./
"""
