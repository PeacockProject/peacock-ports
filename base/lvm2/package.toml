[package]
name = "lvm2"
version = "2.03.40"
description = "Logical Volume Manager 2 (Arch version) — provides dmsetup + libdevmapper used by Peacock initramfs for nested-root dm-linear mapping"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://mirrors.kernel.org/sourceware/lvm2/LVM2.2.03.40.tgz"
checksum = ""
build_deps = ["base-devel", "bash", "util-linux"]
# Our util-linux feather carries the STATIC libs (libblkid.a, libuuid.a) that
# the distro util-linux omits. lvm2's --enable-static_link builds dmsetup.static
# which links -lblkid statically, so without these the build fails ("cannot find
# -lblkid") and never caches — rebuilding every run. ftr-installed at the build
# arch (-> /lib), where the static linker finds them.
build_dep_packages = ["util-linux"]
script = """
tarball="$(ls -1 LVM2.*.tgz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi
./configure \
  --prefix="$(pwd)/stage" \
  --sbindir="$(pwd)/stage/sbin" \
  --enable-static_link \
  --disable-selinux \
  --disable-udev_sync \
  --disable-systemd-journal \
  --without-systemd \
  --without-systemdsystemunitdir \
  --enable-applib \
  --enable-cmdlib
make -j"$(nproc)" device-mapper
make -j"$(nproc)" install_device-mapper
cp -a stage/sbin stage/lib stage/include ./ 2>/dev/null || true
"""
