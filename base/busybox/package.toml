[package]
name = "busybox"
version = "1.36.1"
description = "Swiss Army Knife of Embedded Linux"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://busybox.net/downloads/busybox-1.36.1.tar.bz2"
checksum = "b8cc24c9574d809e7279c3be349795c5d5ceb6fdf19ca709f80cde50e47de314"
use_qemu = false
build_deps = ["base-devel"]
# Arch-agnostic: the cross toolchain + CROSS_COMPILE come from the
# c-toolchain capability, resolved for whatever device arch consumes
# busybox (aarch64, armv7h, ...). No hardcoded triple.
capabilities = ["c-toolchain"]
script = """
echo "Configuring Busybox..."
make defconfig
# The deprecated `tc` applet no longer builds against modern kernel
# headers (the CBQ structs it uses were removed). Disable it.
sed -i -e 's/^CONFIG_TC=y/# CONFIG_TC is not set/' .config
yes "" | make oldconfig

echo "Building static Busybox (CROSS_COMPILE=${CROSS_COMPILE:-native})..."
MAKE_ARGS="LDFLAGS=--static"
[ -n "${CROSS_COMPILE:-}" ] && MAKE_ARGS="$MAKE_ARGS CROSS_COMPILE=${CROSS_COMPILE}"
make $MAKE_ARGS -j"$(nproc)" busybox

echo "Staging busybox -> /usr/bin/busybox ..."
mkdir -p stage/usr/bin
install -m 0755 busybox stage/usr/bin/busybox
"""
