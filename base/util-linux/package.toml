[package]
name = "util-linux"
version = "2.41"
description = "Miscellaneous system utilities (Arch version) — provides losetup, partx, blkid, lsblk, mount, mountpoint, etc. used by Peacock initramfs for partition probing"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-2.41.tar.gz"
checksum = ""
type = "autotools"
build_deps = ["base-devel", "bash", "ncurses"]
# Standard autotools; legacy --prefix=$(pwd)/stage + cp staging is normalized to
# /usr via DESTDIR=$pkgdir. Remaining flags are real configure args.
configure_args = "--disable-makeinstall-chown --disable-makeinstall-setuid --without-systemd --without-systemdsystemunitdir --without-python --disable-bash-completion --disable-rpath --disable-lsfd --enable-static-programs=losetup,blkid,partx,lsblk"
