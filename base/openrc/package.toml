[package]
name = "openrc"
version = "0.63.2"
description = "OpenRC init system"

[build]
source = "https://github.com/OpenRC/openrc/archive/refs/tags/0.63.tar.gz"
checksum = "" # skipping checksum for now as allowed
build_deps = ["meson", "ninja", "pkgconf", "gcc", "make"]
script = """
mkdir -p build
cd build
meson setup .. \
    --prefix=/usr \
    --sysconfdir=/etc \
    --sbindir=/usr/bin \
    --bindir=/usr/bin \
    --libdir=/usr/lib \
    --libexecdir=/usr/lib/rc \
    -Dbranding='"Peacock"' \
    -Dsysvinit=true

ninja
DESTDIR="$PWD/../stage" ninja install

# Fix shebangs or paths if needed
# Create essential directories for openrc
mkdir -p ../stage/run/openrc
touch ../stage/run/openrc/softlevel

# Keep OpenRC on live console output (tty/fbcon), disable file logger.
if [ -f ../stage/etc/rc.conf ]; then
    sed -i 's/^#rc_logger="NO"/rc_logger="NO"/' ../stage/etc/rc.conf
fi
"""
