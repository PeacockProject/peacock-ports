[package]
name = "peacock-initramfs-tools"
version = "0.1.0"
description = "Initramfs shell scripts and helpers consumed by peacock mkinitfs (init.sh template, /init Go wrapper source, subparts-mount.sh)."

# Source-of-truth note:
#   The three asset files shipped by this port (init.sh.in, init-wrapper.go.in,
#   subparts-mount.sh) MUST stay in sync with their twins under
#   Peacock/assets/initramfs/. The Peacock copies are the fallback used by
#   internal/mkinitfs when this port has not been built yet; the copies in
#   this port directory are what pacman installs to /usr/lib/peacock/.
#   Keep them identical until the layout supports a single canonical location.

[build]
source = ""
checksum = ""
use_qemu = false
cross_compile = ""
script = """
mkdir -p stage/usr/lib/peacock

install -m 0644 init.sh.in            stage/usr/lib/peacock/init.sh.in
install -m 0644 init-wrapper.go.in    stage/usr/lib/peacock/init-wrapper.go.in
install -m 0755 subparts-mount.sh     stage/usr/lib/peacock/subparts-mount.sh
"""
