[package]
name = "toolchain-arm-linux-gnueabihf"
version = "7.5-2019.12"
description = "Linaro GCC 7.5-2019.12 arm-linux-gnueabihf cross-compiler"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/arm-linux-gnueabihf/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz"
checksum = "" # TODO: fill with actual sha256
type = "raw"
# raw type: prebuilt toolchain. prepare() (default) extracts the tarball
# (strip 1 -> bin/ at root); ./build.sh check()s bin/ exists and stages the tree.
