[package]
name = "sddm-openrc"
version = "20260215"
description = "OpenRC sddm init script (Artix)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = ""
checksum = ""
script = """
set -e

install -Dm755 sddm.initd "$PWD/stage/etc/init.d/sddm"
install -Dm644 sddm.pam "$PWD/stage/etc/pam.d/sddm"
"""
