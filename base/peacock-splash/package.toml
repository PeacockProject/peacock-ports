[package]
name = "peacock-splash"
version = "1.1.1"
description = "Simple framebuffer splash screen utility for initramfs"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = ""
checksum = ""
build_dep_packages = ["toolchain-arm-linux-gnueabihf"]
use_qemu = false
cross_compile = "arm-linux-gnueabihf-"
script = """
mkdir -p stage/usr/bin
cp splash.c stage/usr/bin/splash.c
${CROSS_COMPILE:-}gcc -static -o stage/usr/bin/peacock-splash splash.c -lm
STRIP_BIN="${CROSS_COMPILE:-}strip"
$STRIP_BIN -s stage/usr/bin/peacock-splash 2>/dev/null || strip -s stage/usr/bin/peacock-splash
"""
