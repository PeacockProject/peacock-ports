[package]
name = "peacock-splash"
version = "1.1.1"
description = "Simple framebuffer splash screen utility for initramfs"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = ""
checksum = ""
use_qemu = false
build_deps = ["base-devel"]
# Arch-agnostic: the cross toolchain + CROSS_COMPILE resolve per consuming
# device arch via the c-toolchain capability (no hardcoded triple).
capabilities = ["c-toolchain"]
type = "raw"
# Custom single-file C build — ./build.sh build() compiles peacock-splash with
# the cross toolchain; package() stages it and splash.c into $pkgdir.
