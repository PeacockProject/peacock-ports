[package]
name = "peacock-sddm-theme-peacock-phone"
version = "1.0.6"
description = "PeacockOS phone-first SDDM theme (touch friendly, dark)"
depends = ["sddm"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
# Pure asset theme — no source/compilation. ./build.sh package() stages the
# theme files into $pkgdir.
