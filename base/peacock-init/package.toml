[package]
name = "peacock-init"
version = "0.2.3"
description = "PeacockOS base supervisor / PID 1. Boots the base, enters the active flavor (plain chroot in phase 1, PID+mount namespaces later), and stays resident to supervise + recover. Installs /sbin/peacock-init and the /sbin/init symlink the initramfs hands off to."

[install]
layout = "system"

[build]
source = ""
checksum = ""
use_qemu = false
build_deps = ["base-devel", "go"]
# Built for the consuming device arch via Go cross-compilation. CGO is
# disabled, so no C cross toolchain is actually used — the c-toolchain
# capability is only here to resolve the device arch ($ARCH) and satisfy the
# cross-build guard. The Go source is vendored as aux files (main.go, go.mod).
capabilities = ["c-toolchain"]
type = "raw"
# Go cross-build — ./build.sh build() compiles peacock-init (CGO disabled, arch
# from $ARCH); package() stages /sbin/peacock-init + the /sbin/init symlink.
