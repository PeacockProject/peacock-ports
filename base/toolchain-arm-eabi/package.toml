[package]
name = "toolchain-arm-eabi"
version = "4.9-2017.01"
description = "Linaro GCC 4.9 arm-eabi toolchain"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/arm-eabi/gcc-linaro-4.9.4-2017.01-x86_64_arm-eabi.tar.xz"
checksum = ""
type = "raw"
# raw type: prebuilt toolchain. prepare() (default) extracts the tarball
# (strip 1 -> bin/ at root); ./build.sh check()s bin/ exists and stages the tree.
