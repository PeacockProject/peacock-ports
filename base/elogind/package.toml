[package]
name = "elogind"
version = "255.17"
description = "logind extracted from systemd (OpenRC-friendly)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/elogind/elogind/archive/refs/tags/v255.17.tar.gz"
checksum = "a9725ae3f73f8d910de84c108bc11bfd4c782bef6a4190b2ec70c5d2f22344db"
build_deps = [
    "gcc",
    "make",
    "meson",
    "ninja",
    "pkgconf",
    "python",
    "python-jinja",
    "gperf",
    "diffutils"
]
script = """
set -e

JOBS="${PEACOCK_JOBS:-}"
if [ -z "$JOBS" ]; then
    if command -v nproc >/dev/null 2>&1; then
        JOBS="$(nproc)"
    else
        JOBS=1
    fi
fi

meson setup build \
    --prefix=/usr \
    --libexecdir=/usr/lib/elogind \
    -Dmode=release \
    -Ddefault-hierarchy=unified \
    -Dcgroup-controller=openrc \
    -Ddefault-kill-user-processes=false \
    -Dinstall-sysconfdir=true \
    -Dutmp=true \
    -Dsmack=false \
    -Dselinux=disabled \
    -Dxenctrl=disabled \
    -Daudit=disabled \
    -Dpolkit=disabled \
    -Dman=disabled \
    -Dhalt-path=/usr/bin/halt \
    -Dpoweroff-path=/usr/bin/poweroff \
    -Dreboot-path=/usr/bin/reboot \
    -Dkexec-path=/usr/bin/kexec

meson compile -C build -j "$JOBS"
DESTDIR="$PWD/stage" meson install -C build
"""
