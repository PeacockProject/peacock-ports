[package]
name = "pbsplash"
version = "0.1.0"
description = "Static pbsplash with tfblib for initramfs testing"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
use_qemu = false
cross_compile = "arm-linux-gnueabihf-"
type = "raw"
# Custom static C build (armhf cross). ./build.sh overrides prepare() to extract
# the bundled tarball without strip-components; build() links pbsplash against
# libtfb.a; package() stages the binary + assets into $pkgdir.
