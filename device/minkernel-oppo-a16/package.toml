# MinKernel (mk) chainloader boot.img for OPPO A16 (MT6765).
# Builds the kernel-less Android boot image containing the mk stage0
# payload. Final artifact installed at:
#   /usr/share/peacock/bootloaders/mk-oppo-a16-boot.img
#
# Pin `source` to a tagged release once PeacockProject/MinKernel starts
# cutting them; until then we track master via the github tarball and
# version off the commit count (0.0.<n>).

[package]
name = "minkernel-oppo-a16"
version = "0.0.16"
description = "MinKernel (mk) stage0 chainloader boot.img for OPPO A16 (MT6765)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/MinKernel/archive/refs/heads/master.tar.gz"
checksum = ""
type = "bootloader"
build_deps = ["base-devel", "clang", "lld", "llvm", "android-tools", "dtc", "python", "gzip", "coreutils"]
# Build via the bootloader type (lib/build/bootloader.sh); ./build.sh sets the
# make target + output image.
