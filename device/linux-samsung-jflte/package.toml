[package]
name = "linux-samsung-jflte"
version = "3.4.113.8"
description = "Samsung Galaxy S4 kernel fork (LineageOS)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
# Source from LineageOS as used by pmbootstrap
source = "https://github.com/LineageOS/android_kernel_samsung_jf/archive/0b7873d52c2331383f37eb908e54940eeac07345.tar.gz"
checksum = "26475c4aeef1e105ccc53b17bc8e468300d28b6d442eee7f3f300806571c0bc6"
build_dep_packages = ["toolchain-arm-eabi", "bash", "bc", "bison", "flex", "perl", "ncurses", "openssl", "gettext", "make"]
use_qemu = false
cross_compile = "arm-eabi-"
# Kernel defconfig file, referenced by the script as $KERNEL_CONFIG.
kernel_config = "config"

# Build script (Real compilation)
# Requires arm-none-eabi-gcc and make on host
