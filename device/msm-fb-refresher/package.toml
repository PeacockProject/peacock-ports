[package]
name = "msm-fb-refresher"
version = "1.0.0"
description = "Placeholder msm-fb-refresher package for Samsung Galaxy S4 (jflte)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
build_dep_packages = ["toolchain-arm-linux-gnueabihf"]
use_qemu = false
cross_compile = "arm-linux-gnueabihf-"
# No source tarball: refresher.c is vendored in the port dir, so prepare() is a
# no-op. ./build.sh compiles it (build()) and stages the binary + source (package()).
