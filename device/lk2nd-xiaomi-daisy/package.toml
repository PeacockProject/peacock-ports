# lk2nd secondary bootloader image for Xiaomi Mi A2 Lite (daisy / msm8953).
# Build target is the SoC-level `lk2nd-msm8953`; daisy is selected at
# runtime by lk2nd's device-tree probing (no LK2ND_DEVICE knob needed
# for msm8953). Final artifact installed at:
#   /usr/share/peacock/bootloaders/lk2nd-xiaomi-daisy.img
#
# Pin `source` to a tagged release once PeacockProject/lk2nd_peacock
# cuts them; until then we track master via the github tarball and
# version off the upstream commit count (0.0.<n>).

[package]
name = "lk2nd-xiaomi-daisy"
version = "0.0.9075"
description = "lk2nd secondary bootloader image for Xiaomi Mi A2 Lite (daisy / msm8953)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/lk2nd_peacock/archive/refs/heads/master.tar.gz"
checksum = ""
build_deps = [
  "base-devel",
  "arm-none-eabi-binutils",
  "arm-none-eabi-gcc",
  "dtc",
  "python",
  "coreutils",
]
script = """
tarball="$(ls -1 master.tar.gz lk2nd_peacock-*.tar.gz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi

if [ ! -f makefile ] || [ ! -f project/lk2nd-msm8953.mk ]; then
  echo "Error: lk2nd sources not found after extraction"
  exit 1
fi

# `lk2nd-msm8953` is the SoC-wide build target; daisy is auto-detected
# at runtime via DT probing. Toolchain prefix follows the upstream
# building.md guidance (arm-none-eabi-).
make -j$(nproc) TOOLCHAIN_PREFIX=arm-none-eabi- lk2nd-msm8953

LK2ND_IMG="build-lk2nd-msm8953/lk2nd.img"
if [ ! -f "$LK2ND_IMG" ]; then
  echo "Error: expected lk2nd image not found at $LK2ND_IMG"
  exit 1
fi

mkdir -p stage/usr/share/peacock/bootloaders
install -m 0644 "$LK2ND_IMG" stage/usr/share/peacock/bootloaders/lk2nd-xiaomi-daisy.img
"""
