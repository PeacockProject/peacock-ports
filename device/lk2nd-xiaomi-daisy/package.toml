# lk2nd secondary bootloader image for Xiaomi Mi A2 Lite (daisy / msm8953).
# Build target is the SoC-level `lk2nd-msm8953`; daisy is selected at
# runtime by lk2nd's device-tree probing (no LK2ND_DEVICE knob needed
# for msm8953). Final artifact installed at:
#   /usr/share/peacock/bootloaders/lk2nd-xiaomi-daisy.img
#
# Pin `source` to a tagged release once PeacockProject/lk2nd_peacock
# cuts them; until then we track master via the github tarball and
# version off the upstream commit count (0.0.<n>).

[package]
name = "lk2nd-xiaomi-daisy"
version = "0.0.9075"
description = "lk2nd secondary bootloader image for Xiaomi Mi A2 Lite (daisy / msm8953)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/lk2nd_peacock/archive/refs/heads/master.tar.gz"
checksum = ""
type = "bootloader"
build_deps = [
  "base-devel",
  "dtc",
  "python",
  "coreutils",
]
# lk2nd is bare-metal ARM firmware: always cross-compiled (never qemu —
# there's no libc to run a native compiler against). The arm-none-eabi
# toolchain comes from the c-toolchain capability with a bare-metal triple
# override; the build script's TOOLCHAIN_PREFIX=arm-none-eabi- then finds
# arm-none-eabi-gcc/binutils on PATH. No hardcoded cross packages.
use_qemu = false
target_arch = "armv7h"
triple = "arm-none-eabi"
capabilities = ["c-toolchain"]
# Build via the bootloader type (lib/build/bootloader.sh); ./build.sh sets the
# make target + output image.
