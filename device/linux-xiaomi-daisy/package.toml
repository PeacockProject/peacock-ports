[package]
name = "linux-xiaomi-daisy"
version = "6.16.3.r0"
description = "Mainline kernel for Xiaomi Mi A2 Lite (daisy / msm8953); also builds a PRP-trimmed kernel (zImage-prp) in the same tree"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
source = "https://github.com/msm8953-mainline/linux/archive/v6.16.3-r0.tar.gz"
checksum = "f84c20e6dd6acf205fe1b64632a00d66307cc4676f5dc9b1d5ff7fe7867e2b1e"
build_deps = ["base-devel", "bc", "dtc", "kmod", "cpio", "python", "perl", "openssl"]
use_qemu = false
# Cross toolchain + CROSS_COMPILE are resolved from target_arch + the
# c-toolchain capability via toolchains.toml — no hardcoded cross packages
# or prefix here. On Arch that's aarch64-linux-gnu-gcc/binutils; on Debian
# crossbuild-essential-arm64; CROSS_COMPILE derives to aarch64-linux-gnu-.
target_arch = "aarch64"
capabilities = ["c-toolchain"]
# This port builds two kernels from one source tree: the full kernel
# (kernel_config) staged as zImage, and a PRP-trimmed recovery kernel
# (prp_kernel_config) staged as zImage-prp. The PRP recovery reuses
# zImage-prp instead of a separate linux-<dev>-prp port — one download,
# one toolchain. The script references these via $KERNEL_CONFIG /
# $PRP_KERNEL_CONFIG (injected by the builder).
kernel_config = "config"
prp_kernel_config = "config-prp"

