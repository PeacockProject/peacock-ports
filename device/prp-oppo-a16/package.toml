# PRP recovery boot.img for OPPO A16 (MT6765).
# Builds the PRP recovery image (kernel + PRP initramfs + boot.img wrapper)
# for OPPO A16. Final artifact installed at:
#   /usr/share/peacock/recovery/prp-oppo-a16-recovery.img
#
# PRP is the Peacock Recovery Project — a self-contained recovery
# environment with the PRP GUI, SSH access, and the canonical
# subparts-mount helper. The Peacock build pipeline flashes this image
# to the device's `recovery` partition; the device boots into PRP when
# the bootloader's recovery flag (BCB or OPPO phoenix reserve) is set.
#
# Pin `source` to a tagged release once PeacockProject/PRP starts
# cutting them; until then we track master via the github tarball and
# version off the commit count (0.0.<n>).
#
# Build deps:
# - mkbootimg: ships in `android-tools` on Arch.
# - python3: required by mkbootimg and PRP's check-kernel-config.sh.
# - cpio, gzip, find, sed, file, sha256sum: PRP initramfs assembly.
# - busybox-static: PRP installs busybox into its initramfs; provided
#   by the `busybox` peacock port at /boot or via $BUSYBOX_STATIC.
#
# Runtime dep: a kernel image. PRP's scripts/common.sh resolves
# $KERNEL_IMAGE → $KERNEL_PACKAGE → the configured peacock kernel
# cache. The matching kernel for this device is `linux-oppo-a16`,
# which must be built (and its zImage available at one of the
# documented cache paths) before this port can produce a bootable
# recovery image.

[package]
name = "prp-oppo-a16"
version = "0.0.30"
description = "PRP (Peacock Recovery Project) recovery boot.img for OPPO A16 (MT6765)"
depends = ["linux-oppo-a16", "busybox"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/PRP/archive/refs/heads/master.tar.gz"
checksum = ""
build_deps = ["base-devel", "android-tools", "python", "cpio", "gzip", "coreutils", "sed", "file"]
script = """
tarball="$(ls -1 master.tar.gz PRP-*.tar.gz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi

if [ ! -f Makefile ] || [ ! -f configs/oppo-a16.env ]; then
  echo "Error: PRP sources not found after extraction"
  exit 1
fi

OUT_DIR="${OUT_DIR:-$(pwd)/out/oppo-a16}"
mkdir -p "$OUT_DIR"

# Build PRP initramfs + bootimg for oppo-a16.
# scripts/common.sh's resolve_kernel_image picks up $KERNEL_IMAGE if
# set, otherwise walks the peacock build-cache for linux-oppo-a16
# build outputs.
make initramfs TARGET=oppo-a16 OUT_DIR="$OUT_DIR"
make bootimg TARGET=oppo-a16 OUT_DIR="$OUT_DIR"

BOOTIMG="$OUT_DIR/prp-oppo-a16-recovery.img"
if [ ! -f "$BOOTIMG" ]; then
  echo "Error: expected PRP boot image not found at $BOOTIMG"
  exit 1
fi

mkdir -p stage/usr/share/peacock/recovery
install -m 0644 "$BOOTIMG" stage/usr/share/peacock/recovery/prp-oppo-a16-recovery.img
"""
