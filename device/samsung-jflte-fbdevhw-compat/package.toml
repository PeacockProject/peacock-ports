[package]
name = "samsung-jflte-fbdevhw-compat"
version = "21.1.21.2"
description = "Samsung jflte compatibility patch for Xorg libfbdevhw"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
dependencies = ["xorg-server"]
build_deps = [
    "base-devel",
    "pixman",
    "xorg-server-devel"
]
source = "https://www.x.org/releases/individual/xserver/xorg-server-21.1.21.tar.xz"
checksum = "c0cbe5545b3f645bae6024b830d1d1154a956350683a4e52b2fff5b0fa1ab519"
patches = "fbdevhw-nonpci-fallback.patch"
# prepare() (default) extracts xorg-server (strip 1) + applies $patches.
# raw + ./build.sh: compile the patched fbdevhw.c into a standalone libfbdevhw.so
# and stage it into $pkgdir.
