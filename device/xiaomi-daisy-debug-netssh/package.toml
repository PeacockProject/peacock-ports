[package]
name = "xiaomi-daisy-debug-netssh"
version = "1.0.0"
description = "Debug helper for daisy: auto USB RNDIS + DHCP + SSH daemon (OpenRC)"
depends = [
    "openrc",
    "coreutils",
    "iproute2",
    "inetutils",
    "busybox",
    "kmod",
    "dropbear",
    "openssh",
    "shadow",
]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
dependencies_openrc = [
    "openrc",
    "coreutils",
    "iproute2",
    "inetutils",
    "busybox",
    "kmod",
    "dropbear",
    "openssh",
    "shadow"
]
type = "raw"
# Debug helper port: no source tarball (prepare() is a no-op). ./build.sh stages
# the RNDIS/DHCP + SSH OpenRC services, helper scripts, config and a busybox
# fallback into $pkgdir (package()).
