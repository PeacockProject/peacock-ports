[package]
name = "samsung-jflte-debug-netssh"
version = "1.0.1"
description = "Debug helper: auto USB RNDIS + DHCP + SSH daemon (OpenRC)"
depends = [
    "openrc",
    "coreutils",
    "iproute2",
    "inetutils",
    "busybox",
    "openssh",
    "shadow",
]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
dependencies_openrc = [
    "openrc",
    "coreutils",
    "iproute2",
    "inetutils",
    "busybox",
    "openssh",
    "shadow"
]
# No source: stages the debug RNDIS/DHCP + SSH scripts, config, and OpenRC
# services into $pkgdir. prepare() is a no-op; package() writes the files.
