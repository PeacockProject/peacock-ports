[package]
name = "linux-oppo-a16"
version = "4.19.127.r0"
description = "MT6765 kernel for OPPO A16 (CPH2269 / oppo6765, variant 20379), built from the public vendor source"

[install]
layout = "system"

[build]
# Self-contained MTK vendor kernel: the oppo/mediatek drivers are already
# vendored in-tree (drivers/{misc,gpu}/mediatek, drivers/soc/oppo, Oplus build
# scaffolding), so this builds from the one repo. Pinned to an immutable commit
# archive (branch oppo/mt6765_r_11.1.4_a16 @ HEAD).
source = "https://github.com/PeacockProject/android_kernel_oppo_mt6765/archive/ca76529668254bafcbdf96675ea7994ba7eb3903.tar.gz"
checksum = "e8e1c446943957a58164afd759b587cc432243968316a0d6a4f39a9f84bc621d"
type = "raw"
build_deps = ["base-devel", "bc", "dtc", "kmod", "cpio", "python", "perl", "openssl"]
use_qemu = false
target_arch = "aarch64"
capabilities = ["c-toolchain"]
# Build logic lives in ./build.sh (build()/package()), not inline here.
#
# NOTE — UNVERIFIED. MTK 4.19 vendor kernel; the first real compile will likely
# need iteration (see ./build.sh for the defconfig / -Werror / GCC-vs-clang
# knobs). Defconfig defaults to oppo6765_defconfig; override with
# $OPPO_A16_DEFCONFIG.
