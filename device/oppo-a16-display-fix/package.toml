[package]
name = "oppo-a16-display-fix"
version = "1.1.0"
description = "OPPO A16 OpenRC display preflight and Xorg/SDDM quirks"
depends = ["peacock-sddm-theme-peacock-phone"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
dependencies_openrc = [
    "openrc",
    "coreutils",
    "psmisc",
    "libinput",
    "xf86-input-libinput",
    "xf86-input-evdev",
    "xorg-xinput",
    "openbox",
    "xterm",
    "fastfetch",
    "peacock-sddm-theme-peacock-phone"
]
type = "raw"
# Display quirk port: no source tarball (prepare() is a no-op). ./build.sh
# compiles the fbpan FBIOPAN_DISPLAY helper and stages the OpenRC display-fix
# service, udev/Xorg/SDDM config and xfce wrappers into $pkgdir (package()).
