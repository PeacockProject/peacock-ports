# PRP recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953).
# Same shape as prp-oppo-a16; uses the PRP-focused kernel
# (linux-xiaomi-daisy-prp) which trims the upstream kernel to a
# recovery-only built-in set for fast boot and deterministic bring-up.
#
# Final artifact installed at:
#   /usr/share/peacock/recovery/prp-xiaomi-daisy-recovery.img

[package]
name = "prp-xiaomi-daisy"
version = "0.0.30"
description = "PRP (Peacock Recovery Project) recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953)"
depends = ["linux-xiaomi-daisy-prp", "busybox"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/PRP/archive/refs/heads/master.tar.gz"
checksum = ""
build_deps = ["base-devel", "android-tools", "python", "cpio", "gzip", "coreutils", "sed", "file"]
script = """
tarball="$(ls -1 master.tar.gz PRP-*.tar.gz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi

if [ ! -f Makefile ] || [ ! -f configs/xiaomi-daisy.env ]; then
  echo "Error: PRP sources not found after extraction"
  exit 1
fi

OUT_DIR="${OUT_DIR:-$(pwd)/out/xiaomi-daisy}"
mkdir -p "$OUT_DIR"

make initramfs TARGET=xiaomi-daisy OUT_DIR="$OUT_DIR"
make bootimg TARGET=xiaomi-daisy OUT_DIR="$OUT_DIR"

BOOTIMG="$OUT_DIR/prp-xiaomi-daisy-recovery.img"
if [ ! -f "$BOOTIMG" ]; then
  echo "Error: expected PRP boot image not found at $BOOTIMG"
  exit 1
fi

mkdir -p stage/usr/share/peacock/recovery
install -m 0644 "$BOOTIMG" stage/usr/share/peacock/recovery/prp-xiaomi-daisy-recovery.img
"""
