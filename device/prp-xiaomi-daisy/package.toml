# PRP recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953).
# Same shape as prp-oppo-a16. The PRP-trimmed kernel is the linux-xiaomi-
# daisy-prp subpackage built by the linux-xiaomi-daisy port
# (prp_kernel_config). It is a build dependency here: peacock ftr-installs
# it into this build chroot, putting the kernel at /boot/zImage, which the
# PRP build consumes via KERNEL_IMAGE. busybox (static) likewise installs
# to /usr/bin/busybox. Neither ships in the phone's OS rootfs.
#
# Final artifact installed at:
#   /usr/share/peacock/recovery/prp-xiaomi-daisy-recovery.img

[package]
name = "prp-xiaomi-daisy"
version = "0.0.30"
description = "PRP (Peacock Recovery Project) recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/PRP/archive/refs/heads/master.tar.gz"
checksum = ""
# zig: PRP cross-compiles its static musl initramfs binaries with `zig cc`
# (ZIG_TARGET, e.g. aarch64-linux-musl).
build_deps = ["base-devel", "android-tools", "python", "cpio", "gzip", "coreutils", "sed", "file", "zig"]
# Our own packages, ftr-installed into this build chroot before the build:
# the PRP kernel (-> /boot/zImage) and static busybox (-> /usr/bin/busybox).
build_dep_packages = ["linux-xiaomi-daisy-prp", "busybox", "peacock-splash"]
script = """
tarball="$(ls -1 master.tar.gz PRP-*.tar.gz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi

if [ ! -f Makefile ] || [ ! -f configs/xiaomi-daisy.env ]; then
  echo "Error: PRP sources not found after extraction"
  exit 1
fi

OUT_DIR="${OUT_DIR:-$(pwd)/out/xiaomi-daisy}"
mkdir -p "$OUT_DIR"

# The PRP kernel + busybox were ftr-installed into this chroot as build
# deps; point PRP's build at those installed paths.
export KERNEL_IMAGE="${KERNEL_IMAGE:-/boot/zImage}"
export BUSYBOX_STATIC="${BUSYBOX_STATIC:-/usr/bin/busybox}"

make initramfs TARGET=xiaomi-daisy OUT_DIR="$OUT_DIR"
make bootimg TARGET=xiaomi-daisy OUT_DIR="$OUT_DIR"

BOOTIMG="$OUT_DIR/prp-xiaomi-daisy-recovery.img"
if [ ! -f "$BOOTIMG" ]; then
  echo "Error: expected PRP boot image not found at $BOOTIMG"
  exit 1
fi

mkdir -p stage/usr/share/peacock/recovery
install -m 0644 "$BOOTIMG" stage/usr/share/peacock/recovery/prp-xiaomi-daisy-recovery.img
"""
