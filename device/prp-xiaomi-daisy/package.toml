# PRP recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953).
# Same shape as prp-oppo-a16. The PRP-trimmed kernel is the linux-xiaomi-
# daisy-prp subpackage built by the linux-xiaomi-daisy port
# (prp_kernel_config). It is a build dependency here: peacock ftr-installs
# it into this build chroot, putting the kernel at /boot/zImage, which the
# PRP build consumes via KERNEL_IMAGE. busybox (static) likewise installs
# to /usr/bin/busybox. Neither ships in the phone's OS rootfs.
#
# Final artifacts installed at:
#   /usr/share/peacock/recovery/prp-xiaomi-daisy-recovery.img  (boot.img)
#   /usr/share/peacock/recovery/prp-xiaomi-daisy-rootfs.img    (PRP_ROOTFS overlay)

[package]
name = "prp-xiaomi-daisy"
version = "0.0.32"
description = "PRP (Peacock Recovery Project) recovery boot.img for Xiaomi Mi A2 Lite (daisy / MSM8953)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/PRP/archive/refs/heads/master.tar.gz"
checksum = ""
# zig: PRP cross-compiles its static musl initramfs binaries with `zig cc`
# (ZIG_TARGET, e.g. aarch64-linux-musl).
# NOTE: curl (build-gui/build-dropbear downloads) and e2fsprogs (mkfs.ext4 for
# the overlay) are intentionally NOT listed: they're already present in the
# build chroot (pulled by base + kept current by the pre-build -Syyu), and
# declaring them broke the build-deps install. The overlay build finds them on
# PATH regardless.
build_deps = ["base-devel", "android-tools", "python", "cpio", "gzip", "coreutils", "sed", "file", "zig"]
# Our own packages, ftr-installed into this build chroot before the build:
# the PRP kernel (-> /boot/zImage) and static busybox (-> /usr/bin/busybox).
build_dep_packages = ["linux-xiaomi-daisy-prp", "busybox", "peacock-splash", "dropbear"]
type = "raw"
# prepare() (default) extracts PRP master (strip 1); ./build.sh runs PRP's make
# targets verbatim (kernel + busybox from the ftr-installed build deps) and
# stages the boot.img + the separate PRP_ROOTFS overlay image.
