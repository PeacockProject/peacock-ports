[package]
name = "device-qemu-x86_64"
version = "1.0.0"
description = "QEMU x86_64 virtual device package"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
dependencies = ["linux", "linux-firmware", "mkinitcpio", "iptables-nft"]
dependencies_systemd = ["base"]
dependencies_openrc = [
    "filesystem",
    "glibc",
    "bash",
    "coreutils",
    "util-linux",
    "openrc",
    "sysvinit-tools",
    "procps-ng",
    "grep",
    "sed",
    "gawk",
    "tar",
    "pacman",
    "gcc-libs",
    "shadow",
    "psmisc",
    "iproute2",
    "iputils",
    "inetutils",
    "nano",
    "dhcpcd",
    "udev-openrc"
]
script = "echo 'Metapackage installed'"
