[package]
name = "device-xiaomi-daisy"
version = "1.0.0"
description = "Xiaomi Mi A2 Lite device package"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
dependencies = ["linux-firmware", "linux-xiaomi-daisy", "firmware-xiaomi-daisy", "firmware-qcom-adreno-a530", "peacock-sddm-theme-peacock-phone"]
dependencies_systemd = ["base"]
dependencies_openrc = [
    "filesystem",
    "glibc",
    "bash",
    "coreutils",
    "util-linux",
    "openrc",
    "sysvinit-tools",
    "procps-ng",
    "grep",
    "sed",
    "gawk",
    "tar",
    "pacman",
    "gcc-libs",
    "shadow",
    "psmisc",
    "iproute2",
    "iputils",
    "inetutils",
    "nano",
    "dhcpcd",
    "udev-openrc"
]
type = "raw"
# Device meta/quirk port: no source tarball (prepare() is a no-op). ./build.sh
# stages the daisy OpenRC seat-init service, SDDM/Xorg config and session files
# into $pkgdir (package()).
