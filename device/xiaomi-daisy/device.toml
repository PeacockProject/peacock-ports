[device]
name = "Xiaomi Mi A2 Lite"
architecture = "aarch64"
soc = "msm8953"
status = "stable"
flash_method = "fastboot-bootimg"

# Support matrix surfaced by the peacock-builder GUI. Values: ok | partial | none.
[support]
touch = "ok"
gpu = "ok"
wifi = "ok"
bluetooth = "ok"
calls = "partial"
calls_note = "Modem links up; audio routing in active development."
sms = "ok"
modem = "partial"
modem_note = "Cellular data works; VoLTE not yet implemented."
camrear = "partial"
camrear_note = "Stills work; video capture is unstable."
camfront = "none"
gps = "ok"
sensors = "partial"
sensors_note = "Accel + light + proximity; gyro is flaky."
battery = "ok"
audio = "ok"

[boot]
cmdline = "quiet loglevel=2"
generate_bootimg = true

[boot.android]
base = "0x80000000"
page_size = 2048
kernel_offset = "0x00008000"
ramdisk_offset = "0x01000000"
second_offset = "0x00f00000"
tags_offset = "0x00000100"

[quirks]
keep_fb_refresher_with_dm = false
xorg_force_vt1 = true
use_fb_refresher = false
legacy_rootfs_ext4 = false
