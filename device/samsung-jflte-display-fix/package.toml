[package]
name = "samsung-jflte-display-fix"
version = "1.0.41"
description = "Samsung jflte OpenRC display preflight fix"
depends = ["peacock-sddm-theme-peacock-phone"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
dependencies_openrc = ["openrc", "coreutils", "psmisc", "libinput", "xf86-input-libinput", "xf86-input-evdev", "xorg-xinput", "openbox", "xterm", "fastfetch", "peacock-sddm-theme-peacock-phone"]
# No source: stages the OpenRC display-preflight service, SDDM/X11 config, and
# XFCE session wrappers into $pkgdir. prepare() is a no-op; package() writes the
# files.
