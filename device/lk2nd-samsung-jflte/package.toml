# lk2nd secondary bootloader image for Samsung Galaxy S4 LTE (jflte / msm8960).
# Build target is the SoC-level `lk2nd-msm8960`; jflte is selected at
# runtime by lk2nd's device-tree probing (see the `samsung-jflte` node
# with `compatible = "samsung,jflte", "qcom,msm8960"` and
# `lk2nd,match-bootloader = "I9505*"` in
# lk2nd_peacock/lk2nd/device/dts/msm8960/bundle.dts). No LK2ND_DEVICE
# knob needed — msm8960 follows the same DT-probing pattern as msm8953.
# Final artifact installed at:
#   /usr/share/peacock/bootloaders/lk2nd-samsung-jflte.img
#
# Pin `source` to a tagged release once PeacockProject/lk2nd_peacock
# cuts them; until then we track master via the github tarball and
# version off the upstream commit count (0.0.<n>).

[package]
name = "lk2nd-samsung-jflte"
version = "0.0.9075"
description = "lk2nd secondary bootloader image for Samsung Galaxy S4 LTE (jflte / msm8960)"

[build]
source = "https://github.com/PeacockProject/lk2nd_peacock/archive/refs/heads/master.tar.gz"
checksum = ""
build_deps = [
  "base-devel",
  "arm-none-eabi-binutils",
  "arm-none-eabi-gcc",
  "dtc",
  "python",
  "coreutils",
]
script = """
tarball="$(ls -1 master.tar.gz lk2nd_peacock-*.tar.gz 2>/dev/null | head -n1)"
if [ -n "$tarball" ]; then
  tar -xzf "$tarball" --strip-components=1
fi

if [ ! -f makefile ] || [ ! -f project/lk2nd-msm8960.mk ]; then
  echo "Error: lk2nd sources not found after extraction"
  exit 1
fi

# `lk2nd-msm8960` is the SoC-wide build target; jflte is auto-detected
# at runtime via DT probing (samsung,jflte / qcom,msm8960 in the
# msm8960 bundle.dts). Toolchain prefix follows the upstream
# building.md guidance (arm-none-eabi-).
make -j$(nproc) TOOLCHAIN_PREFIX=arm-none-eabi- lk2nd-msm8960

LK2ND_IMG="build-lk2nd-msm8960/lk2nd.img"
if [ ! -f "$LK2ND_IMG" ]; then
  echo "Error: expected lk2nd image not found at $LK2ND_IMG"
  exit 1
fi

mkdir -p stage/usr/share/peacock/bootloaders
install -m 0644 "$LK2ND_IMG" stage/usr/share/peacock/bootloaders/lk2nd-samsung-jflte.img
"""
