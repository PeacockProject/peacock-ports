# lk2nd secondary bootloader image for Samsung Galaxy S4 LTE (jflte / msm8960).
# Build target is the SoC-level `lk2nd-msm8960`; jflte is selected at
# runtime by lk2nd's device-tree probing (see the `samsung-jflte` node
# with `compatible = "samsung,jflte", "qcom,msm8960"` and
# `lk2nd,match-bootloader = "I9505*"` in
# lk2nd_peacock/lk2nd/device/dts/msm8960/bundle.dts). No LK2ND_DEVICE
# knob needed — msm8960 follows the same DT-probing pattern as msm8953.
# Final artifact installed at:
#   /usr/share/peacock/bootloaders/lk2nd-samsung-jflte.img
#
# Pin `source` to a tagged release once PeacockProject/lk2nd_peacock
# cuts them; until then we track master via the github tarball and
# version off the upstream commit count (0.0.<n>).

[package]
name = "lk2nd-samsung-jflte"
version = "0.0.9075"
description = "lk2nd secondary bootloader image for Samsung Galaxy S4 LTE (jflte / msm8960)"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://github.com/PeacockProject/lk2nd_peacock/archive/refs/heads/master.tar.gz"
checksum = ""
type = "bootloader"
build_deps = [
  "base-devel",
  "dtc",
  "python",
  "coreutils",
]
# Bare-metal ARM firmware: always cross, arm-none-eabi via c-toolchain
# capability (see lk2nd-xiaomi-daisy).
use_qemu = false
target_arch = "armv7h"
triple = "arm-none-eabi"
capabilities = ["c-toolchain"]
# Build via the bootloader type (lib/build/bootloader.sh); ./build.sh sets the
# make target + output image.
