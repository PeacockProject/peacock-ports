[package]
name = "libxrender-jflte"
version = "0.9.12.2"
description = "jflte-patched libXrender with crash guards for fbdev userspace"
provides = ["libxrender"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
source = "https://www.x.org/releases/individual/lib/libXrender-0.9.12.tar.xz"
checksum = ""
type = "autotools"
patches = "jflte-xrender-guard.patch"
build_deps = ["gcc", "make", "pkgconf", "patch", "libx11", "xorgproto", "xorg-util-macros"]
# autotools type extracts + applies $patches (prepare default), then
# configure/make/install. ./build.sh overrides configure() to keep codegen
# conservative (CFLAGS) and pass --disable-static for this legacy stack.
