[package]
name = "samsung-jflte-fbdev-compat"
version = "0.5.1.1"
description = "Samsung jflte fbdev compatibility module for Xorg"

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
dependencies = ["xf86-video-fbdev"]
build_deps = [
    "base-devel",
    "pkgconf",
    "xorg-util-macros",
    "xorg-server-devel",
    "xorgproto"
]
source = "https://www.x.org/releases/individual/driver/xf86-video-fbdev-0.5.1.tar.xz"
checksum = "9c2bc0fb9af092804138e8d5cb5627cabf2919ef60f0d1544a95c4ac2047f387"
patches = "fbdev-unknown-type-fallback.patch"
# prepare() (default) extracts xf86-video-fbdev (strip 1) + applies $patches.
# raw + ./build.sh: configure/make, then stage only fbdev_drv.so into $pkgdir.
