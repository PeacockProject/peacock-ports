[package]
name = "samsung-jflte-sddm-quirk"
version = "1.0.0"
description = "jflte-specific SDDM/logind startup quirk handling"
depends = ["sddm-openrc", "elogind", "dbus", "udev-openrc", "openrc"]

# Phase 1 schema migration — defaults to layout = "system"; revisit per-port later.
[install]
layout = "system"

[build]
type = "raw"
dependencies_openrc = ["sddm-openrc", "elogind", "dbus", "udev-openrc", "openrc", "coreutils"]
# No source: stages the seat-master udev rule and the jflte SDDM OpenRC service
# into $pkgdir. prepare() is a no-op; package() writes the files.
