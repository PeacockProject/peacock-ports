# Arch flavor build-deps alias table.
#
# Canonical baseline: peacock-ports manifests have always been written using
# Arch package names for build_deps, so this table is an identity map. Every
# build_deps / build_dep_packages entry that appears anywhere under base/ or
# device/ as of the Phase 1 migration is listed here, mapping to itself.
#
# The Peacock CLI / feather will look up build_deps names against this table
# when materialising the build chroot for flavor = "arch". Entries should be
# added here when a new manifest introduces a new Arch package name.

[aliases]
"aarch64-linux-gnu-binutils" = "aarch64-linux-gnu-binutils"
"aarch64-linux-gnu-gcc" = "aarch64-linux-gnu-gcc"
"arm-none-eabi-binutils" = "arm-none-eabi-binutils"
"arm-none-eabi-gcc" = "arm-none-eabi-gcc"
"awk" = "awk"
