name: Notify site (device data)

# When a device's status.toml or photo changes, ping the site repo to rebuild the
# /devices page + wiki. Needs a SITE_DISPATCH_TOKEN secret (fine-grained PAT with
# "contents: read/write" or the repository-dispatch permission on PeacockProject/site).
# Without it the site still updates on its daily schedule / manual run — this just makes
# it instant.

on:
  push:
    branches: [main]
    paths:
      - 'device/*/status.toml'
      - 'device/*/image.*'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site device-pages workflow
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/PeacockProject/site/dispatches \
            -d '{"event_type":"devices-update"}'
