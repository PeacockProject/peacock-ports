name: ci
on: [push, pull_request]
jobs:
  schema-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python3 tools/phase1-verify.py

  toml-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: parse + re-serialize every manifest
        run: |
          set -e
          python3 -c "
          import tomllib, pathlib
          fails = []
          for p in pathlib.Path('.').rglob('package.toml'):
              try:
                  tomllib.loads(p.read_text())
              except Exception as e:
                  fails.append(f'{p}: {e}')
          if fails:
              for f in fails: print(f)
              raise SystemExit(1)
          "
